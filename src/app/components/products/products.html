<div class="container mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold mb-6 text-gray-800">Products</h1>

  <!-- Filter Toggle (Only below 768px) -->
  <div class="flex justify-end mb-4 sm:hidden">
    <button
      (click)="toggleFilters()"
      class="flex items-center gap-2 px-4 py-2 bg-gray-800 text-white rounded-md shadow hover:bg-gray-700 transition"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
      </svg>
      Filters
    </button>
  </div>

  <!-- Filters -->
  <div
    [ngClass]="{
      'hidden md:block': !showFilters,
      block: showFilters,
    }"
    class="bg-white rounded-md shadow-lg p-4 mb-6 border border-gray-200"
  >
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-4">
      <!-- Search -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Search</label>
        <input
          type="text"
          [(ngModel)]="search"
          (keyup.enter)="onSearch()"
          placeholder="Search products..."
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500"
        />
      </div>

      <!-- Min Price -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Min Price</label>
        <select
          [(ngModel)]="minPrice"
          (change)="onSearch()"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500"
        >
          <option [ngValue]="null">No minimum</option>
          <option [ngValue]="500">KES 500</option>
          <option [ngValue]="1000">KES 1,000</option>
          <option [ngValue]="5000">KES 5,000</option>
          <option [ngValue]="10000">KES 10,000</option>
          <option [ngValue]="50000">KES 50,000</option>
          <option [ngValue]="100000">KES 100,000</option>
        </select>
      </div>

      <!-- Max Price -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Max Price</label>
        <select
          [(ngModel)]="maxPrice"
          (change)="onSearch()"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500"
        >
          <option [ngValue]="null">No maximum</option>
          <option [ngValue]="1000">KES 1,000</option>
          <option [ngValue]="5000">KES 5,000</option>
          <option [ngValue]="10000">KES 10,000</option>
          <option [ngValue]="50000">KES 50,000</option>
          <option [ngValue]="100000">KES 100,000</option>
          <option [ngValue]="500000">KES 500,000</option>
        </select>
      </div>

      <!-- Sort By -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Sort By</label>
        <select
          [(ngModel)]="filters.sortBy"
          (change)="onSortChange()"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500"
        >
          <option value="name">Name</option>
          <option value="price">Price</option>
        </select>
      </div>

      <!-- Availability -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Availability</label>
        <select
          [(ngModel)]="availableOnly"
          (change)="onSearch()"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500"
        >
          <option [ngValue]="false">All Products</option>
          <option [ngValue]="true">In Stock Only</option>
        </select>
      </div>
    </div>

    <div class="mt-4 flex flex-wrap gap-2">
      <button
        (click)="onSearch()"
        class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
        Apply Filters
      </button>
      <button
        (click)="filters.sortDir = filters.sortDir === 'asc' ? 'desc' : 'asc'; onSortChange()"
        class="px-4 py-2 border border-gray-300 text-gray-700 rounded-md hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
        {{ filters.sortDir === 'asc' ? '↑ Ascending' : '↓ Descending' }}
      </button>
    </div>
  </div>

  <!-- Active Filter Tags -->
  <div *ngIf="activeFilters.length" class="flex flex-wrap gap-2 mb-4">
    <span
      *ngFor="let tag of activeFilters"
      class="flex items-center gap-1 px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm"
    >
      {{ tag }}
      <button (click)="clearFilter(tag)" class="hover:text-blue-600 font-bold" aria-label="Remove filter">×</button>
    </span>
  </div>

  <!-- Loading State with Skeletons -->
  <div *ngIf="loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    <app-skeleton-card *ngFor="let item of skeletonItems"></app-skeleton-card>
  </div>

  <!-- Error State -->
  <div *ngIf="error && !loading" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
    {{ error }}
  </div>

  <!-- Empty State -->
  <div *ngIf="!loading && !error && products?.length === 0" class="text-center py-16">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 mx-auto text-gray-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
    </svg>
    <h3 class="text-lg font-medium text-gray-900 mb-2">No products found</h3>
    <p class="text-gray-500">Try adjusting your filters or search terms.</p>
  </div>

  <!-- Products Grid -->
  <div
    *ngIf="!loading && !error && products?.length"
    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
  >
    <app-product-card
      *ngFor="let product of products"
      [product]="product"
      [imageUrl]="productImages.get(product.id) || null"
      [showAddToCart]="!isSeller"
      [imageHeight]="192"
      (addToCart)="onAddToCart($event)"
    ></app-product-card>
  </div>
</div>
